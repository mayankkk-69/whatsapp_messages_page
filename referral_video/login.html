<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – ArchitectsHive Broadcast</title>
  <meta name="description" content="Sign in to the ArchitectsHive WhatsApp Broadcast Dashboard."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #25D366; --green-dark: #128C7E; --green-light: #dcfce7;
      --red: #ef4444; --red-light: #fef2f2;
      --bg: #f4f6f9; --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827; --text-muted: #6b7280;
      --shadow-lg: 0 20px 60px rgba(0,0,0,.14);
      --radius: 16px; --radius-sm: 10px;
      --transition: .2s ease;
      --font: 'Inter', sans-serif;
    }
    body {
      font-family: var(--font); background: var(--bg);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; position: relative; overflow: hidden;
    }

    /* Decorative blobs */
    body::before {
      content: ''; position: fixed; top: -200px; right: -200px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,211,102,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; bottom: -200px; left: -200px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(18,140,126,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Card */
    .login-wrap {
      width: 100%; max-width: 440px;
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); border: 1px solid var(--border);
      padding: 40px 40px 36px;
      animation: fadeUp .4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative; z-index: 1;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: none; }
    }

    /* Header */
    .login-logo {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 46px; height: 46px; border-radius: 14px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(37,211,102,.35);
    }
    .login-logo-text { font-size: 1.15rem; font-weight: 800; letter-spacing: -.4px; }
    .login-logo-sub  { font-size: .72rem; color: var(--text-muted); font-weight: 500; margin-top: 1px; }

    .login-heading { font-size: 1.5rem; font-weight: 800; letter-spacing: -.5px; margin-bottom: 6px; }
    .login-sub     { font-size: .875rem; color: var(--text-muted); margin-bottom: 28px; }

    /* Form */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .form-label  { font-size: .82rem; font-weight: 600; color: var(--text); }
    .form-input  {
      padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: .9rem; font-family: var(--font); color: var(--text);
      transition: var(--transition); background: var(--bg); outline: none; width: 100%;
    }
    .form-input:focus  { border-color: var(--green); background: #fff; box-shadow: 0 0 0 3px rgba(37,211,102,.12); }
    .form-input.error  { border-color: var(--red); background: var(--red-light); }

    /* Password wrapper */
    .pass-wrap { position: relative; }
    .pass-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      padding: 4px; display: flex; align-items: center;
      transition: var(--transition);
    }
    .pass-toggle:hover { color: var(--text); }

    /* Remember / Forgot row */
    .form-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .remember-label {
      display: flex; align-items: center; gap: 8px;
      font-size: .82rem; color: var(--text-muted); cursor: pointer;
    }
    .remember-label input[type=checkbox] {
      width: 16px; height: 16px; accent-color: var(--green); cursor: pointer;
    }
    .forgot-link {
      font-size: .82rem; font-weight: 600; color: var(--green-dark);
      text-decoration: none; transition: var(--transition);
    }
    .forgot-link:hover { color: var(--green); }

    /* Submit button */
    .btn-login {
      width: 100%; padding: 13px; border: none; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #fff; font-family: var(--font); font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 4px 16px rgba(37,211,102,.35);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(37,211,102,.45); }
    .btn-login:disabled { opacity: .7; cursor: not-allowed; transform: none; }

    /* Error alert */
    .alert-error {
      background: var(--red-light); color: var(--red);
      border: 1.5px solid #fecaca; border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: .85rem; font-weight: 500;
      margin-bottom: 18px; display: none; align-items: center; gap: 8px;
    }
    .alert-error.show { display: flex; }



    /* Loading spinner */
    .spinner {
      width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrap">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="9,22 9,12 15,12 15,22" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="login-logo-text">ArchitectsHive</div>
        <div class="login-logo-sub">WhatsApp Broadcast Dashboard</div>
      </div>
    </div>

    <h1 class="login-heading">Welcome back 👋</h1>
    <p class="login-sub">Sign in to manage your campaigns and clients.</p>

    <!-- Error Alert -->
    <div class="alert-error" id="login-error">
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18" flex-shrink="0">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
        <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="16" x2="12.01" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span id="login-error-msg">Invalid email or password.</span>
    </div>

    <!-- Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input class="form-input" type="email" id="login-email" placeholder="admin@architectshive.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="pass-wrap">
          <input class="form-input" type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" style="padding-right:42px;" required/>
          <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/Hide password" id="pass-toggle-btn">
            <svg id="eye-show" viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            <svg id="eye-hide" viewBox="0 0 24 24" fill="none" width="18" height="18" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>

      <div class="form-row">
        <label class="remember-label">
          <input type="checkbox" id="remember-me"/> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <div class="spinner" id="login-spinner"></div>
        <span id="login-btn-text">Sign In</span>
        <svg id="login-arrow" viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>



  </div>

  <script>
    // Auto-redirect if already logged in
    (async () => {
      try {
        const res = await fetch('api/check_session.php');
        const data = await res.json();
        if (data.loggedIn) window.location.href = 'index.html';
      } catch(e) {}
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorBox = document.getElementById('login-error');
      const errMsg   = document.getElementById('login-error-msg');
      const btn      = document.getElementById('login-btn');
      const spinner  = document.getElementById('login-spinner');
      const btnText  = document.getElementById('login-btn-text');
      const arrow    = document.getElementById('login-arrow');

      // Clear previous errors
      errorBox.classList.remove('show');
      document.getElementById('login-email').classList.remove('error');
      document.getElementById('login-password').classList.remove('error');

      // Show loading state
      btn.disabled    = true;
      spinner.style.display = 'block';
      btnText.textContent   = 'Signing in…';
      arrow.style.display   = 'none';

      try {
        const res  = await fetch('api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          btnText.textContent = '✓ Redirecting…';
          setTimeout(() => window.location.href = 'index.html', 600);
        } else {
          errMsg.textContent = data.message || 'Invalid email or password.';
          errorBox.classList.add('show');
          document.getElementById('login-email').classList.add('error');
          document.getElementById('login-password').classList.add('error');
          btn.disabled = false;
          spinner.style.display = 'none';
          btnText.textContent   = 'Sign In';
          arrow.style.display   = 'block';
        }
      } catch(err) {
        errMsg.textContent = 'Connection error. Please try again.';
        errorBox.classList.add('show');
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent   = 'Sign In';
        arrow.style.display   = 'block';
      }
    }

    function togglePassword() {
      const input   = document.getElementById('login-password');
      const eyeShow = document.getElementById('eye-show');
      const eyeHide = document.getElementById('eye-hide');
      if (input.type === 'password') {
        input.type = 'text';
        eyeShow.style.display = 'none';
        eyeHide.style.display = 'block';
      } else {
        input.type = 'password';
        eyeShow.style.display = 'block';
        eyeHide.style.display = 'none';
      }
    }


  </script>
</body>
</html>
