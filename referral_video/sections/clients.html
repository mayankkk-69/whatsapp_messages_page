    <!-- ══════════ PAGE: CLIENTS ══════════ -->
    <div class="page-section" data-page="clients">
      <div class="page-header">
        <div>
          <h1 class="page-heading">Clients</h1>
          <p class="page-desc">Manage your broadcast audience list</p>
        </div>
        <button class="btn btn-primary" id="add-client-btn" onclick="openAddClientModal()"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Add Client</button>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title-group"><div class="card-icon blue"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="#fff" stroke-width="2"/><circle cx="9" cy="7" r="4" stroke="#fff" stroke-width="2"/></svg></div><div><h2 class="card-title">All Clients</h2><p class="card-subtitle">10 contacts in your list</p></div></div>
          <div class="client-search-wrap" style="border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;width:220px;display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" width="15" height="15"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><input class="client-search" id="clients-page-search" type="text" placeholder="Search clients…" style="border:none;outline:none;flex:1;font-size:.875rem"/></div>
        </div>
        <div class="table-wrap">
          <table class="data-table" id="clients-table">
            <thead><tr><th>Name</th><th>Phone</th><th>Added</th><th>Campaigns Sent</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="clients-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

<!-- ══ ADD CLIENT MODAL ══ -->
<div class="modal-overlay" id="add-client-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke="#fff" stroke-width="2"/><line x1="19" y1="8" x2="19" y2="14" stroke="#fff" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="11" x2="22" y2="11" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div>
          <h2 class="modal-title">Add New Client</h2>
          <p class="modal-subtitle">Add a contact to your broadcast list</p>
        </div>
      </div>
      <button class="modal-close" onclick="closeAddClientModal()" title="Close">
        <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="modal-form-grid">
        <div class="modal-form-group">
          <label class="form-label" for="new-client-name">Full Name <span class="required-star">*</span></label>
          <input class="form-input" id="new-client-name" type="text" placeholder="e.g. Rahul Sharma"/>
        </div>
        <div class="modal-form-group">
          <label class="form-label" for="new-client-phone">WhatsApp Number <span class="required-star">*</span></label>
          <div class="phone-input-wrap">
            <span class="phone-prefix">+91</span>
            <input class="form-input phone-input" id="new-client-phone" type="tel" placeholder="98765 43210" maxlength="11"/>
          </div>
        </div>
        <div class="modal-form-group full-width">
          <label class="form-label" for="new-client-email">Email Address <span class="optional-tag">Optional</span></label>
          <input class="form-input" id="new-client-email" type="email" placeholder="rahul@example.com"/>
        </div>
        <div class="modal-form-group full-width">
          <label class="form-label">Tags <span class="optional-tag">Optional</span></label>
          <div class="tag-selector" id="tag-selector">
            <button class="tag-option active" data-tag="Lead" onclick="toggleTag(this)">Lead</button>
            <button class="tag-option" data-tag="Customer" onclick="toggleTag(this)">Customer</button>
            <button class="tag-option" data-tag="VIP" onclick="toggleTag(this)">VIP</button>
            <button class="tag-option" data-tag="Prospect" onclick="toggleTag(this)">Prospect</button>
            <button class="tag-option" data-tag="Partner" onclick="toggleTag(this)">Partner</button>
          </div>
        </div>
        <div class="modal-form-group full-width">
          <label class="form-label" for="new-client-notes">Notes <span class="optional-tag">Optional</span></label>
          <textarea class="form-input" id="new-client-notes" rows="2" placeholder="Any notes about this client…"></textarea>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddClientModal()">Cancel</button>
      <button class="btn btn-primary" id="save-client-btn" onclick="saveNewClient()">
        <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Save Client
      </button>
    </div>
  </div>
</div>
